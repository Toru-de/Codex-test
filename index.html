<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lua Editor</title>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    body {
      margin: 0;
      background: linear-gradient(135deg, #2b3a42, #1e1e1e);
      font-family: sans-serif;
      color: #fff;
      animation: fadeIn 0.5s ease-out;
    }
    #toolbar {
      padding: 10px;
      background: rgba(255,255,255,0.05);
      display: flex;
      justify-content: flex-end;
    }
    button {
      background: #4caf50;
      color: white;
      border: none;
      padding: 8px 16px;
      cursor: pointer;
      transition: background 0.3s;
      border-radius: 4px;
    }
    button:hover {
      background: #66bb6a;
    }
    #editor {
      height: calc(100vh - 50px);
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <button id="runBtn">Run</button>
  </div>
  <div id="editor"></div>
  <script src="renderer.js"></script>
</body>
</html>
